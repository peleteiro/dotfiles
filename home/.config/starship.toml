# Starship prompt configuration
# Simple prompt: directory (green) + git branch (blue) + $

format = """
$directory\
$git_branch\
$character
"""

# Directory module (green, shows current directory)
[directory]
style = "bold green"
truncation_length = 0  # Show full path (like \w in bash)
truncate_to_repo = false

# Git branch module (blue, shows current branch)
[git_branch]
symbol = ""
style = "bold blue"
format = "[$branch]($style)"

# Character module (shows $ or #)
[character]
success_symbol = '[\$](bold)'
error_symbol = '[\$](bold red)'
